<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <style>
    /* Reset some default styles for a cleaner look */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* The parent wrapper holding both columns */
    .signup-container {
      display: flex;
      width: 100%;
      max-width: 1000px;
      background-color: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    /* Left column (Form) takes up half the width */
    .form-section {
      flex: 1;
      padding: 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-section h2 {
      margin-bottom: 1.5rem;
      color: #333;
    }

    /* Simple styling for form inputs */
    .form-section input {
      width: 100%;
      padding: 12px;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    .form-section button {
      width: 100%;
      padding: 12px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .form-section button:hover {
      background-color: #0056b3;
    }

    /* Right column (Image container) takes up the other half */
    .image-section {
      flex: 1;
      display: block;
    }

    /* Forces the image to fill the right column perfectly */
    .image-section img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Prevents stretching by cropping slightly if ratios differ */
    }

    /* Responsive design: Stack them vertically on mobile screens */
    @media (max-width: 768px) {
      .signup-container {
        flex-direction: column-reverse; /* Puts the form on top on mobile */
      }
      
      .image-section {
        height: 250px; /* Gives the image a fixed height on small screens */
      }
    }
  </style>
</head>
<body>

  <div class="signup-container">
    <!-- Left Side: Your Form -->
    <div class="form-section">
      <h2>Create an Account</h2>
      <form>
        <input type="email" placeholder="Email" required />
        <input type="password" placeholder="Password" required />
        <button type="submit">Sign Up</button>
      </form>
    </div>

    <!-- Right Side: Your Image -->
    <div class="image-section">
      <img src="https://raw.githubusercontent.com/Tharshi-Peiris/new/main/signup.jpg" alt="Signup Visual" />
    </div>
  </div>

</body>
</html>
