<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Premium Charcoal Co.</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #E8490F;
      --orange-hover: #c93d0c;
      --dark: #111111;
      --white: #ffffff;
      --input-border: #ddd;
      --text-dark: #1a1a1a;
      --text-muted: #888;
      --error: #e53e3e;
      --success: #22a85a;
    }

    html, body {
      height: 100%;
      font-family: 'Open Sans', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: #fff;
    }

    /* ── NAV ── */
    nav {
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 68px;
      flex-shrink: 0;
      z-index: 10;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      text-decoration: none;
    }

    .nav-right a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.9rem;
      margin-left: 20px;
      transition: color 0.2s;
    }
    .nav-right a:hover { color: #fff; }

    .btn-login-nav {
      border: 1.5px solid rgba(255,255,255,0.4);
      padding: 7px 18px;
      border-radius: 24px;
      font-weight: 600 !important;
      font-size: 0.88rem !important;
      transition: border-color 0.2s !important;
    }
    .btn-login-nav:hover { border-color: rgba(255,255,255,0.9) !important; color: #fff !important; }

    /* ── MAIN TWO-COLUMN SPLIT ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 68px);
    }

    /* Column 1: Signup Form */
    .panel-left {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      padding: 24px; /* Minimal container padding for mobile safety */
    }

    .form-box {
      width: 100%;
      max-width: 440px;
      margin: 0; /* Removed external paddings/margins */
      animation: slideIn 0.5s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .form-box h1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      margin-bottom: 6px;
      color: var(--text-dark);
    }

    .form-box .subtitle {
      font-size: 0.92rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .form-box .subtitle a {
      color: var(--orange);
      text-decoration: none;
      font-weight: 600;
    }
    .form-box .subtitle a:hover { text-decoration: underline; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 7px;
      font-family: 'Montserrat', sans-serif;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg.field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #bbb;
      width: 17px;
      height: 17px;
      pointer-events: none;
      transition: color 0.2s;
    }

    .input-wrap input,
    .input-wrap select {
      width: 100%;
      padding: 12px 14px 12px 40px;
      border: 1.5px solid var(--input-border);
      border-radius: 9px;
      font-size: 0.93rem;
      font-family: 'Open Sans', sans-serif;
      color: var(--text-dark);
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      outline: none;
      appearance: none;
    }

    .input-wrap input:focus,
    .input-wrap select:focus {
      border-color: var(--orange);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(232,73,15,0.12);
    }

    .input-wrap:focus-within svg.field-icon { color: var(--orange); }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #bbb;
      padding: 0;
      display: flex;
      align-items: center;
    }
    .toggle-pw:hover { color: var(--orange); }
    .toggle-pw svg { width: 17px; height: 17px; }

    .pw-strength {
      margin-top: 8px;
    }
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
    }
    .strength-bar span {
      flex: 1;
      height: 4px;
      border-radius: 4px;
      background: #eee;
      transition: background 0.3s;
    }
    .strength-label {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .error-msg {
      display: none;
      color: var(--error);
      font-size: 0.78rem;
      margin-top: 4px;
    }

    .terms {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.84rem;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .terms input[type="checkbox"] {
      accent-color: var(--orange);
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .terms a { color: var(--orange); text-decoration: none; font-weight: 600; }
    .terms a:hover { text-decoration: underline; }

    .btn-signup {
      width: 100%;
      background: var(--orange);
      color: var(--white);
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      letter-spacing: 0.02em;
    }
    .btn-signup:hover {
      background: var(--orange-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(232,73,15,0.3);
    }
    .btn-signup:active { transform: translateY(0); }
    .btn-signup:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #ccc;
      font-size: 0.82rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e5e5;
    }

    .btn-google {
      width: 100%;
      background: #fff;
      color: var(--text-dark);
      border: 1.5px solid #ddd;
      padding: 12px;
      border-radius: 10px;
      font-family: 'Open Sans', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-google:hover { background: #f9f9f9; border-color: #bbb; }

    /* Column 2: Dedicated Image Panel */
    .panel-right {
      width: 100%;
      height: 100%;
      background: url('https://raw.githubusercontent.com/Tharshi-Peiris/new/main/signup.jpg') center/cover no-repeat;
    }

    /* ── SUCCESS MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(17,17,17,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      animation: fadeIn 0.25s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    .modal-box {
      background: #fff;
      border-radius: 16px;
      padding: 36px 40px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      transform: translateY(14px) scale(0.97);
      animation: popIn 0.3s ease forwards;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }
    @keyframes popIn { to { transform: translateY(0) scale(1); } }

    .modal-icon {
      width: 60px;
      height: 60px;
      background: rgba(34,168,90,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
    }
    .modal-icon svg { width: 30px; height: 30px; color: var(--success); }

    .modal-box h3 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--text-dark);
      margin-bottom: 8px;
    }
    .modal-box p {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    /* Responsive adjustments */
    @media (max-width: 900px) {
      .field-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; }
      .panel-right { display: none; } /* Hides image panel on smaller displays */
      nav { padding: 0 20px; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a href="https://tharshi-peiris.github.io/new/" class="nav-brand">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C6.48 2 2 6.48 2 12c0 3.54 1.84 6.65 4.6 8.44C7.5 15.5 10 13 10 10c1 2 3 4 3 7a8 8 0 1 0-1-15z"/>
      </svg>
      Premium Charcoal Co.
    </a>
    <div class="nav-right">
      <a href="https://tharshi-peiris.github.io/new/">Home</a>
      <a href="login.html" class="btn-login-nav">Sign In</a>
    </div>
  </nav>

  <!-- MAIN CONTAINER -->
  <main>
    
    <!-- FIRST COLUMN: Form -->
    <div class="panel-left">
      <div class="form-box">
        <h1>Create Account</h1>
        <p class="subtitle">Already have an account? <a href="login.html">Sign in here</a></p>

        <div class="field-row">
          <div class="field">
            <label for="fname">First Name</label>
            <div class="input-wrap">
              <input type="text" id="fname" placeholder="John" autocomplete="given-name"/>
              <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <span class="error-msg" id="fname-error">First name is required.</span>
          </div>
          <div class="field">
            <label for="lname">Last Name</label>
            <div class="input-wrap">
              <input type="text" id="lname" placeholder="Doe" autocomplete="family-name"/>
              <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <span class="error-msg" id="lname-error">Last name is required.</span>
          </div>
        </div>

        <div class="field">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </div>
          <span class="error-msg" id="email-error">Please enter a valid email.</span>
        </div>

        <div class="field">
          <label for="phone">Phone Number <span style="color:#bbb;font-weight:400;">(optional)</span></label>
          <div class="input-wrap">
            <input type="tel" id="phone" placeholder="+1 (555) 000-0000" autocomplete="tel"/>
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.18 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 5.55 5.55l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16.92z"/>
            </svg>
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)"/>
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <button class="toggle-pw" type="button" onclick="togglePw('password', this)" title="Show/Hide">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="pw-strength">
            <div class="strength-bar">
              <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
            </div>
            <span class="strength-label" id="strength-label"></span>
          </div>
          <span class="error-msg" id="pw-error">Password must be at least 8 characters.</span>
        </div>

        <div class="field">
          <label for="confirm">Confirm Password</label>
          <div class="input-wrap">
            <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password"/>
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <button class="toggle-pw" type="button" onclick="togglePw('confirm', this)" title="Show/Hide">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="error-msg" id="confirm-error">Passwords do not match.</span>
        </div>

        <label class="terms">
          <input type="checkbox" id="terms-check"/>
          <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
        </label>
        <span class="error-msg" id="terms-error" style="display:none;margin-bottom:10px;">You must accept the terms.</span>

        <button class="btn-signup" onclick="handleSignup()">Create My Account</button>

        <div class="divider">or sign up with</div>

        <button class="btn-google">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continue with Google
        </button>
      </div>
    </div>

    <!-- SECOND COLUMN: Direct Image View -->
    <div class="panel-right"></div>

  </main>

  <script>
    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.querySelector('svg').innerHTML = isText
        ? '<path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    }

    function checkStrength(val) {
      const bars = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3'), document.getElementById('s4')];
      const label = document.getElementById('strength-label');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const colors = ['#e53e3e', '#E8490F', '#f6ad55', '#22a85a'];
      const labels = ['Weak', 'Fair', 'Good', 'Strong'];
      bars.forEach((b, i) => { b.style.background = i < score ? colors[score - 1] : '#eee'; });
      label.textContent = val.length > 0 ? labels[score - 1] || '' : '';
      label.style.color = score > 0 ? colors[score - 1] : '#888';
    }
  </script>

  <!-- Firebase Logic Module -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAXXfVgDZkjJ5-DwcP5PjZACuMJfnUv_AA",
      authDomain: "tharushi-8b869.firebaseapp.com",
      projectId: "tharushi-8b869",
      storageBucket: "tharushi-8b869.firebasestorage.app",
      messagingSenderId: "265329735348",
      appId: "1:265329735348:web:8263202e454044fd2549e1",
      measurementId: "G-M4W3RTE0DZ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function firebaseSignUp(email, password) {
      return createUserWithEmailAndPassword(auth, email, password);
    }

    function saveUserProfile(uid, profileData) {
      return setDoc(doc(db, "users", uid), profileData, { merge: true });
    }

    function showError(id, show) {
      const el = document.getElementById(id);
      if(el) el.style.display = show ? 'block' : 'none';
    }

    function setFieldState(inputId, isError) {
      const input = document.getElementById(inputId);
      if (input) input.style.borderColor = isError ? '#e53e3e' : '#ddd';
    }

    function showSuccessModal(fname) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal-box">
          <div class="modal-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <h3>Welcome${fname ? ', ' + fname : ''}!</h3>
          <p>You've signed up successfully. Redirecting you to sign in…</p>
        </div>
      `;
      document.body.appendChild(overlay);
    }

    function handleSignup() {
      let valid = true;

      const fname = document.getElementById('fname').value.trim();
      showError('fname-error', !fname);
      setFieldState('fname', !fname);
      if (!fname) valid = false;

      const lname = document.getElementById('lname').value.trim();
      showError('lname-error', !lname);
      setFieldState('lname', !lname);
      if (!lname) valid = false;

      const email = document.getElementById('email').value.trim();
      const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      showError('email-error', !emailOk);
      setFieldState('email', !emailOk);
      if (!emailOk) valid = false;

      const phone = document.getElementById('phone').value.trim();

      const pw = document.getElementById('password').value;
      showError('pw-error', pw.length < 8);
      setFieldState('password', pw.length < 8);
      if (pw.length < 8) valid = false;

      const confirm = document.getElementById('confirm').value;
      showError('confirm-error', pw !== confirm);
      setFieldState('confirm', pw !== confirm);
      if (pw !== confirm) valid = false;

      const terms = document.getElementById('terms-check').checked;
      showError('terms-error', !terms);
      if (!terms) valid = false;

      if (!valid) return;

      const btn = document.querySelector('.btn-signup');
      btn.textContent = 'Creating account…';
      btn.disabled = true;

      firebaseSignUp(email, pw)
        .then((userCredential) => {
          const uid = userCredential.user.uid;

          btn.style.background = '#22a85a';
          btn.textContent = 'Account created!';
          showSuccessModal(fname);
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1800);

          saveUserProfile(uid, { fname, lname, phone, email }).catch((profileError) => {
            console.error('Profile save failed (account was still created):', profileError);
          });
        })
        .catch((error) => {
          btn.textContent = 'Create My Account';
          btn.disabled = false;

          const emailErr = document.getElementById('email-error');
          const pwErr = document.getElementById('pw-error');

          if (error.code === 'auth/email-already-in-use') {
            emailErr.textContent = 'This email is already registered. Try signing in instead.';
            emailErr.style.display = 'block';
            setFieldState('email', true);
          } else if (error.code === 'auth/invalid-email') {
            emailErr.textContent = 'That email address looks invalid.';
            emailErr.style.display = 'block';
            setFieldState('email', true);
          } else if (error.code === 'auth/weak-password') {
            pwErr.textContent = 'Password is too weak. Try a longer one.';
            pwErr.style.display = 'block';
            setFieldState('password', true);
          } else {
            alert('Something went wrong: ' + error.message);
          }
          console.error(error.code, error.message);
        });
    }

    window.handleSignup = handleSignup;
  </script>

</body>
</html>
